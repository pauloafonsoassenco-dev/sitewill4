<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucre Dor - Pudins Artesanais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --creme-pudim: #F8EDEB;
            --dourado: #D4A574;
            --chocolate: #5C4033;
            --maracuja: #F4A261;
            --branco-leite: #F5F5F5;
            --roxo: #8B5FBF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--creme-pudim) 0%, #FFF8E7 50%, var(--branco-leite) 100%);
            min-height: 100vh;
            color: var(--chocolate);
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(45deg, var(--dourado), var(--maracuja)) !important;
            box-shadow: 0 8px 32px rgba(212, 165, 116, 0.4);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            font-weight: 700;
            color: white !important;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .pudim-icon {
            background: radial-gradient(circle, #F4D03F 0%, var(--creme-pudim) 70%);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            box-shadow: 0 8px 25px rgba(244, 208, 63, 0.4);
            animation: wobble 3s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(3deg) scale(1.05); }
            75% { transform: rotate(-3deg) scale(1.05); }
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(212, 165, 116, 0.2);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--dourado), var(--maracuja), var(--roxo));
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 25px 80px rgba(212, 165, 116, 0.35);
        }

        .card-header {
            background: linear-gradient(135deg, var(--dourado), var(--maracuja));
            color: white;
            font-weight: 600;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .card-header::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        /* Botões */
        .btn-pudim {
            background: linear-gradient(45deg, var(--dourado), var(--maracuja));
            border: none;
            border-radius: 30px;
            padding: 14px 35px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-pudim:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(212, 165, 116, 0.5);
            color: white;
        }

        .btn-pudim:active {
            transform: translateY(-1px);
        }

        /* Stats Cards */
        .stats-card {
            background: linear-gradient(135deg, var(--creme-pudim), rgba(248, 231, 219, 0.8));
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            height: 100%;
            backdrop-filter: blur(10px);
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(244, 162, 97, 0.1), transparent);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--dourado), var(--maracuja));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        /* Forms */
        .form-control, .form-select {
            border-radius: 20px;
            border: 2px solid rgba(212, 165, 116, 0.2);
            padding: 15px 20px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--dourado);
            box-shadow: 0 0 0 0.25rem rgba(212, 165, 116, 0.2);
            background: white;
            transform: scale(1.02);
        }

        /* Tables */
        .table {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 0;
        }

        .table th {
            background: linear-gradient(45deg, var(--dourado), var(--maracuja));
            color: white;
            border: none;
            font-weight: 600;
            padding: 20px 15px;
        }

        .table td {
            padding: 15px;
            vertical-align: middle;
            border-color: rgba(0,0,0,0.05);
        }

        .table-hover tbody tr:hover {
            background-color: rgba(212, 165, 116, 0.1);
            transform: scale(1.01);
        }

        /* Uniforme Preview */
        .uniforme-preview {
            border-radius: 20px;
            padding: 40px;
            min-height: 350px;
            position: relative;
            border: 4px solid var(--dourado);
            background: var(--creme-pudim);
            transition: all 0.3s ease;
        }

        .uniforme-preview::before {
            content: '👕 UNIFORME SUCRE DOR 👕';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--dourado);
            font-weight: 700;
        }

        /* Decorações */
        .decoration {
            position: absolute;
            font-size: 4rem;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        .decoration-1 { top: 10%; left: 5%; color: var(--maracuja); }
        .decoration-2 { bottom: 20%; right: 10%; color: var(--roxo); transform: rotate(15deg); }
        .decoration-3 { top: 60%; left: 10%; color: var(--dourado); font-size: 3rem; }

        /* Responsivo */
        @media (max-width: 768px) {
            .navbar-brand { font-size: 2rem; }
            .stats-number { font-size: 2rem; }
            .pudim-icon { width: 45px; height: 45px; }
            .container { padding: 0 15px; }
            .card { margin-bottom: 20px; }
        }

        /* Scrollbar custom */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--creme-pudim);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--dourado), var(--maracuja));
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#home">
                <div class="pudim-icon">
                    <i class="fas fa-birthday-cake"></i>
                </div>
                Sucre Dor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#gastos">Gastos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#vendas">Vendas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#uniformes">Uniformes</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="pt-5 mt-5">
        <div class="container text-center py-5">
            <h1 class="display-3 fw-bold mb-4" style="font-family: 'Dancing Script', cursive; color: var(--chocolate);">
                Sucre Dor
            </h1>
            <p class="lead mb-5" style="font-size: 1.4rem; color: var(--chocolate);">
                Pudins artesanais com amor e porpurina ✨
            </p>
            <a href="#dashboard" class="btn btn-pudim btn-lg">
                <i class="fas fa-chart-line me-2"></i>
                Acessar Dashboard
            </a>
        </div>
    </section>

    <!-- Dashboard -->
    <section id="dashboard" class="py-5">
        <div class="container">
            <div class="row g-4 mb-5">
                <!-- Total Vendas Hoje -->
                <div class="col-lg-3 col-md-6">
                    <div class="stats-card h-100 p-4">
                        <i class="fas fa-coins fa-3x text-warning mb-3"></i>
                        <div class="stats-number" id="totalHoje">R$ 0,00</div>
                        <p class="mb-0 fw-semibold">Vendas Hoje</p>
                    </div>
                </div>
                <!-- Vendas Hoje -->
                <div class="col-lg-3 col-md-6">
                    <div class="stats-card h-100 p-4">
                        <i class="fas fa-shopping-cart fa-3x text-success mb-3"></i>
                        <div class="stats-number" id="vendasHoje">0</div>
                        <p class="mb-0 fw-semibold">Pedidos Hoje</p>
                    </div>
                </div>
                <!-- Gastos Totais -->
                <div class="col-lg-3 col-md-6">
                    <div class="stats-card h-100 p-4">
                        <i class="fas fa-receipt fa-3x text-danger mb-3"></i>
                        <div class="stats-number" id="totalGastos">R$ 0,00</div>
                        <p class="mb-0 fw-semibold">Gastos Totais</p>
                    </div>
                </div>
                <!-- Entregas -->
                <div class="col-lg-3 col-md-6">
                    <div class="stats-card h-100 p-4">
                        <i class="fas fa-motorcycle fa-3x text-info mb-3"></i>
                        <div class="stats-number" id="entregasHoje">0</div>
                        <p class="mb-0 fw-semibold">Entregas Hoje</p>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <!-- Gastos -->
                <div class="col-lg-4">
                    <div class="card h-100">
                        <div class="card-header">
                            <i class="fas fa-calculator me-2"></i>
                            Gastos com Ingredientes
                        </div>
                        <div class="card-body">
                            <form id="formGasto" class="needs-validation" novalidate>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Ingrediente</label>
                                    <select class="form-select" id="ingrediente" required>
                                        <option value="">Selecione...</option>
                                        <option value="Leite Condensado" data-preco="8.50">Leite Condensado (R$8,50/lata)</option>
                                        <option value="Chocolate em Pó" data-preco="12.00">Chocolate em Pó (R$12,00/kg)</option>
                                        <option value="Maracujá" data-preco="6.50">Maracujá (R$6,50/kg)</option>
                                        <option value="Porpurina Comestível" data-preco="25.00">Porpurina Comestível (R$25/frasco)</option>
                                        <option value="Mini Forminhas" data-preco="15.00">Mini Forminhas (R$15/pacote)</option>
                                        <option value="Mini Colheres" data-preco="10.00">Mini Colheres (R$10/pacote)</option>
                                        <option value="Leite" data-preco="4.50">Leite (R$4,50/litro)</option>
                                        <option value="Gelatina Incolor" data-preco="3.00">Gelatina Incolor (R$3/caixa)</option>
                                        <option value="Açúcar" data-preco="5.00">Açúcar (R$5/kg)</option>
                                        <option value="Lembrancinhas" data-preco="2.50">Lembrancinhas (R$2,50/un)</option>
                                        <option value="Papel Craft" data-preco="8.00">Papel Craft (R$8/rolo)</option>
                                        <option value="Papel Alumínio" data-preco="12.00">Papel Alumínio (R$12/rolo)</option>
                                    </select>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-6">
                                        <label class="form-label fw-semibold">Quantidade</label>
                                        <input type="number" class="form-control" id="quantidade" min="0" step="0.01" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label fw-semibold">Preço Unit.</label>
                                        <input type="number" class="form-control" id="precoUnit" min="0" step="0.01" readonly>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Observação</label>
                                    <input type="text" class="form-control" id="observacaoGasto" placeholder="Ex: Compra no mercado...">
                                </div>
                                <button type="submit" class="btn btn-pudim w-100">
                                    <i class="fas fa-plus me-2"></i>Adicionar Gasto
                                </button>
                            </form>
                            <hr class="my-4">
                            <div class="text-center">
                                <h5>Total Gastos
